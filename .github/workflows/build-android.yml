name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - cursor/release-mejoras-e44b
      - cursor/ui-shell-fotos-bio-e44b
      - cursor/productos-busqueda-eliminar-e44b
      - cursor/fase0-fase1-seguridad-e44b
      - cursor/fase2-sync-stock-e44b
      - cursor/fase3-sync-conflictos-e44b
      - cursor/ficha-cliente-foto-producto-e44b
      - cursor/remitos-eliminar-sync-admin-e44b
      - cursor/capacidad-1-plataforma-segura-e44b
      - cursor/capacidad-2-sync-certificable-e44b
      - cursor/capacidad-3-dominio-transaccional-e44b
      - cursor/capacidad-4-autorizacion-real-e44b
      - cursor/capacidad-5-release-readiness-e44b
      - cursor/tenant-codigo-empresa-e44b
      - cursor/fix-nube-eliminar-usuarios-e44b
      - cursor/capacidad-6-integridad-stock-cc-e44b
      - cursor/pagos-parciales-remitos-e44b

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Tests
        run: flutter test

      - name: Restaurar keystore (secreto CI)
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEY_PROPERTIES" ]; then
            mkdir -p android/keystore
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore/tata-manager.jks
            printf '%s\n' "$ANDROID_KEY_PROPERTIES" > android/key.properties
            echo "Keystore restaurado desde secrets"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Faltan secrets ANDROID_KEYSTORE_BASE64 / ANDROID_KEY_PROPERTIES."
            echo "::warning::Se genera APK con firma debug para poder probar. Android puede marcarla como no confiable."
            echo "::warning::Para firma release: cargá esos secrets en Settings → Secrets y re-ejecutá."
          fi

      - name: Build APK release
        run: flutter build apk --release

      - name: Preparar carpeta APK
        env:
          SIGNED: ${{ steps.keystore.outputs.signed }}
        run: |
          mkdir -p Instalador_Android
          cp build/app/outputs/flutter-apk/app-release.apk Instalador_Android/TataManager.apk
          if [ "$SIGNED" = "true" ]; then
            FIRMA_TXT="FIRMA: release (keystore del proyecto). Más confiable al instalar."
          else
            FIRMA_TXT="FIRMA: DEBUG (solo prueba). Android puede marcar la app como no confiable."
          fi
          cat > Instalador_Android/LEEME.txt << EOF
          Tata.Manager — APK Android
          =========================

          $FIRMA_TXT

          1) Copiá TataManager.apk al celular
          2) Abrilo e instalá.
             Si pide "orígenes desconocidos" / "app de fuentes externas":
             es normal fuera de Play Store. Permití solo para este APK.
          3) Primera vez: admin / admin123 (si es instalación limpia)
          4) Con internet: Configuración → Activar sincronización online
             (mismo usuario que en la PC)
          5) Al abrir, Android 13+ puede pedir permiso de notificaciones:
             aceptalo para ver título y texto de los avisos.

          Verificá integridad con SHA256SUMS.txt.
          SHA-1 del keystore: docs/FIREBASE_GOOGLE_LOGIN.md (Google Login).
          EOF
          (
            cd Instalador_Android
            sha256sum TataManager.apk LEEME.txt > SHA256SUMS.txt
          )
          ls -la Instalador_Android
          cat Instalador_Android/SHA256SUMS.txt

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Instalador_Android
          path: Instalador_Android
          if-no-files-found: error
          retention-days: 14
